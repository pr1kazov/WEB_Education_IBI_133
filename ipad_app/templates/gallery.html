{% extends 'base.html' %}
{% load static %}

{% block title %}Галерея моделей iPad{% endblock %}
{% block header %}Галерея моделей{% endblock %}

{% block content %}
<center><p>Несколько поколений iPad, которые демонстрируют эволюцию дизайна и технологий:</p></center>
<div class="gallery">
    <figure>
        <img src="{% static 'images/ipad.jpg' %}" alt="iPad" class="zoomable">
        <figcaption>iPad</figcaption>
    </figure>
    <figure>
        <img src="{% static 'images/ipad_Air.jpg' %}" alt="iPad Air" class="zoomable">
        <figcaption>iPad Air</figcaption>
    </figure>
    <figure>
        <img src="{% static 'images/ipad_mini.jpg' %}" alt="iPad mini" class="zoomable">
        <figcaption>iPad mini</figcaption>
    </figure>
</div>
<center><a href="{% url 'home' %}" class="back-link">← Главная</a></center>
{% endblock %}
